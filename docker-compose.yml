x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: '100m'
      max-file: '5'

services:
  meerk-wms:
    image: ghcr.io/meerkapp/wms-backend:latest
    container_name: meerk-wms
    <<: *logging
    ports:
      - '127.0.0.1:${APP_PORT:-3000}:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/healthcheck || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      meerk-postgres:
        condition: service_healthy
      meerk-redis:
        condition: service_healthy
      meerk-minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - meerk-network

  meerk-postgres:
    image: postgres:16-alpine
    container_name: meerk-postgres
    <<: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
    volumes:
      - meerk-postgres-data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 3s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - meerk-network

  meerk-redis:
    image: redis:7-alpine
    container_name: meerk-redis
    <<: *logging
    command: >
      redis-server
      --save ""
      --appendonly yes
      --maxmemory-policy noeviction
      --loglevel warning
    volumes:
      - meerk-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - meerk-network

  meerk-minio:
    image: minio/minio:latest
    container_name: meerk-minio
    <<: *logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - meerk-minio-data:/data
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    restart: unless-stopped
    networks:
      - meerk-network

  meerk-minio-init:
    image: minio/mc:latest
    container_name: meerk-minio-init
    depends_on:
      - meerk-minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://meerk-minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET}/avatars;
      exit 0;
      "
    networks:
      - meerk-network

volumes:
  meerk-postgres-data:
    name: meerk-postgres-data
  meerk-redis-data:
    name: meerk-redis-data
  meerk-minio-data:
    name: meerk-minio-data

networks:
  meerk-network:
    name: meerk-network
    driver: bridge
