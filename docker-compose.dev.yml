services:
  meerk-postgres:
    image: postgres:16-alpine
    container_name: meerk-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
    volumes:
      - meerk-postgres-dev-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meerk-redis:
    image: redis:7-alpine
    container_name: meerk-redis-dev
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory-policy noeviction
      --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  meerk-minio:
    image: minio/minio:latest
    container_name: meerk-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - meerk-minio-dev-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  meerk-minio-init:
    image: minio/mc:latest
    container_name: meerk-minio-init-dev
    depends_on:
      - meerk-minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://meerk-minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET}/avatars;
      exit 0;
      "

volumes:
  meerk-postgres-dev-data:
  meerk-minio-dev-data:
